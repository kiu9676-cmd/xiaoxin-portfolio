<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XiaoXin — 手机端预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }
    .phone-frame {
      width: 390px;
      height: 844px;
      border-radius: 48px;
      border: 12px solid #2a2a3e;
      background: #000;
      overflow: hidden;
      position: relative;
      box-shadow: 0 20px 80px rgba(0,0,0,0.5);
      flex-shrink: 0;
    }
    .phone-notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 28px;
      background: #2a2a3e;
      border-radius: 0 0 18px 18px;
      z-index: 100;
    }
    .phone-screen {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <iframe class="phone-screen" src="http://localhost:5188" title="XiaoXin Mobile Preview"></iframe>
  </div>
</body>
</html>
